server:
  port: 8080

spring:
  application:
    name: kotlin_spring_lock

  datasource:
    url: jdbc:mariadb://localhost:3306/coupon_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        show_sql: true


